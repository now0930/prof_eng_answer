services:
  prof-eng-answer-bot:
    image: nousresearch/hermes-agent:latest
    container_name: prof_eng_answer_bot
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - .:/workspace/prof_eng_answer
      - ./hermes_home:/hermes_home

    working_dir: /workspace/prof_eng_answer

    entrypoint:
      - /bin/bash
      - /workspace/prof_eng_answer/scripts/run_prof_eng_bot.sh

    networks:
      - ai_net

networks:
  ai_net:
    external: true
